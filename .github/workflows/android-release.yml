name: Build Signed Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    name: Build signed APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore PKCS12 signing key
        shell: bash
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > app/mrm-release.p12
          test -s app/mrm-release.p12

      - name: Build signed release
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease \
            -PRELEASE_STORE_FILE=app/mrm-release.p12 \
            -PRELEASE_STORE_PASSWORD="${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.SIGNING_KEY_ALIAS }}"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: MRM-PG-Manager-release-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: MRM-PG-Manager-release-AAB
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error